# OoLu starter skill pack — reviewed, declarative web-automation skills.
#
# The `browser`/`http` skills below are executed by the Playwright/HTTP
# ActionExecutors. `run` skills carry an explicit, hardened step list; step
# string values may reference the skill's parameters as {{param}} and are
# substituted at execution time. Every skill_id is stable so re-loading is
# idempotent.
skills:
  - skill_id: "web.dynamic_dropdown"
    name: "Interact with a Dynamic Dropdown"
    summary: "Open a JavaScript dropdown that lazy-loads its options and select one."
    semver: "1.0.0"
    tags: [web, ui, dropdown, select, form]
    application: web
    adapter: browser
    parameters:
      - name: url
        value_type: string
      - name: trigger_selector
        value_type: string
        description: "selector of the element that opens the dropdown"
      - name: option_selector
        value_type: string
        description: "selector of the option to choose once options load"
    actions:
      - operation: run
        parameters:
          steps:
            - { op: goto, url: "{{url}}" }
            - { op: click, selector: "{{trigger_selector}}" }
            - { op: wait_for, selector: "{{option_selector}}" }
            - { op: click, selector: "{{option_selector}}" }

  - skill_id: "web.paginated_table"
    name: "Extract a Paginated Table"
    summary: "Read the rows of a table across two pages and return them."
    semver: "1.0.0"
    tags: [web, table, extract, pagination, scrape, data]
    application: web
    adapter: browser
    parameters:
      - name: url
        value_type: string
      - name: table_selector
        value_type: string
      - name: next_selector
        value_type: string
    actions:
      - operation: run
        parameters:
          steps:
            - { op: goto, url: "{{url}}" }
            - { op: read_rows, selector: "{{table_selector}}", name: page_1 }
            - { op: click, selector: "{{next_selector}}" }
            - { op: read_rows, selector: "{{table_selector}}", name: page_2 }

  - skill_id: "web.fill_and_submit_form"
    name: "Fill and Submit a Form Field"
    summary: "Type a value into a form field and submit the form."
    semver: "1.0.0"
    tags: [web, form, fill, submit, input]
    application: web
    adapter: browser
    parameters:
      - name: url
        value_type: string
      - name: field_selector
        value_type: string
      - name: value
        value_type: string
      - name: submit_selector
        value_type: string
      - name: result_selector
        value_type: string
        required: false
    actions:
      - operation: run
        parameters:
          steps:
            - { op: goto, url: "{{url}}" }
            - { op: fill, selector: "{{field_selector}}", value: "{{value}}" }
            - { op: click, selector: "{{submit_selector}}" }
            - { op: read_text, selector: "{{result_selector}}", name: result }

  - skill_id: "web.twofa_intercept"
    name: "Solve a 2FA Intercept"
    summary: "Read a one-time passcode from the configured channel and enter it to pass 2FA."
    semver: "1.0.0"
    tags: [web, auth, 2fa, otp, mfa, login]
    application: web
    adapter: browser
    parameters:
      - name: code_selector
        value_type: string
      - name: otp_source
        value_type: string
        description: "where the code arrives (authenticator, sms, email)"
    actions:
      - operation: read_otp
      - operation: fill
      - operation: submit

  - skill_id: "http.get_json"
    name: "Fetch JSON from an API"
    summary: "Perform an authenticated GET request to a JSON endpoint and return the body."
    semver: "1.0.0"
    tags: [http, api, json, fetch, get, read]
    application: http
    adapter: http
    parameters:
      - name: url
        value_type: string
      - name: headers
        value_type: object
        required: false
    actions:
      - operation: get
