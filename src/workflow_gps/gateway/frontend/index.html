<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Workflow-GPS</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; }
  label { display: block; font-size: 0.85rem; margin: 0.75rem 0 0.25rem; }
  input, button { font: inherit; padding: 0.5rem; }
  input { width: 100%; box-sizing: border-box; }
  button { margin-top: 0.75rem; cursor: pointer; }
  #log { margin-top: 1.5rem; border-top: 1px solid #8884; padding-top: 1rem; }
  .msg { padding: 0.4rem 0; border-bottom: 1px solid #8882; font-size: 0.9rem; }
  .evt { color: #2a7; }
  .err { color: #d44; }
</style>
</head>
<body>
<h1>Workflow-GPS</h1>
<label for="token">Access token (OIDC bearer)</label>
<input id="token" placeholder="paste bearer token" autocomplete="off" />
<label for="intent">What do you want done?</label>
<input id="intent" placeholder="describe the task" />
<button id="send">Start workflow</button>
<div id="log"></div>
<script>
const $ = (id) => document.getElementById(id);
const log = (text, cls) => {
  const el = document.createElement("div");
  el.className = "msg" + (cls ? " " + cls : "");
  el.textContent = text;
  $("log").prepend(el);
};

async function api(method, path, body) {
  const headers = { "Authorization": "Bearer " + $("token").value };
  if (body) headers["Content-Type"] = "application/json";
  const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch (e) { data = text; }
  return { status: res.status, data };
}

async function poll(runId) {
  for (let i = 0; i < 60; i++) {
    const { status, data } = await api("GET", "/v1/runs/" + runId);
    if (status !== 200) { log("status " + status, "err"); return; }
    log("phase: " + (data.phase || data.status || "?"), "evt");
    const terminal = ["completed", "failed", "cancelled"];
    if (terminal.includes(data.phase)) { log("done: " + data.phase, "evt"); return; }
    await new Promise((r) => setTimeout(r, 1000));
  }
}

$("send").addEventListener("click", async () => {
  const intent = $("intent").value.trim();
  if (!intent) return;
  log("you: " + intent);
  const { status, data } = await api("POST", "/v1/runs", { intent });
  if (status >= 400) { log("submit failed: " + status, "err"); return; }
  const runId = data.run_id || data.id;
  log("run: " + runId, "evt");
  poll(runId);
});
</script>
</body>
</html>
