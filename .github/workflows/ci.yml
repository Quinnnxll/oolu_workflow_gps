# Continuous integration: lint + the full test suite. Runs on every push
# and pull request, and on demand from the Actions tab (workflow_dispatch).
name: ci

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with the extras the suite exercises)
        run: python -m pip install -e ".[serve,http,oidc,postgres]" pytest "ruff==0.15.8"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: python -m pytest
