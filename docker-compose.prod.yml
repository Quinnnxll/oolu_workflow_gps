# The production stack: Caddy (TLS) -> OoLu -> PostgreSQL, blobs on
# Cloudflare R2. The full walkthrough — Cloudflare DNS, the DigitalOcean
# droplet, R2, model keys, backups — lives in docs/deploy-production.md.
#
#   cp .env.production.example .env    # fill in every value
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs oolu   # admin sign-in
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      OOLU_DOMAIN: ${OOLU_DOMAIN:?the app hostname users visit, e.g. app.example.com}
      OOLU_ADMIN_DOMAIN: ${OOLU_ADMIN_DOMAIN:?the operator console hostname, e.g. admin.example.com}
      # The investor panel's hostname (optional). Set it and Caddy
      # serves deploy/investor-panel.html there as a static page — the
      # hostname must NOT also appear in OOLU_DOMAIN, or the gateway's
      # user shell answers instead. Unset, the block idles on an
      # unpublished loopback address so Caddy boots unchanged.
      OOLU_INVESTORS_DOMAIN: ${OOLU_INVESTORS_DOMAIN:-http://127.0.0.1:8199}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/investor-panel.html:/srv/investors/investor-panel.html:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - oolu

  oolu:
    build: .
    restart: unless-stopped
    expose:
      - "8765"
    environment:
      OOLU_HOST_SECRET: ${OOLU_HOST_SECRET:?set a long random secret (openssl rand -base64 48)}
      OOLU_ADMIN_PASSWORD: ${OOLU_ADMIN_PASSWORD:-}
      # Which Host header gets the operator's admin console; every other
      # hostname (the app domain) serves the user shell.
      OOLU_ADMIN_HOST: ${OOLU_ADMIN_DOMAIN:?the operator console hostname, e.g. admin.example.com}
      # PostgreSQL: the production durable adapter (tenant-walled stores,
      # money-grade invariants ride this connection).
      DATABASE_URL: postgresql://oolu:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/oolu
      # Cloudflare R2 (S3-compatible): the blob layer for the file
      # drawer and the CAD hand's STEP/STL exports. Leave BUCKET empty
      # to keep blobs on the local volume instead.
      OOLU_BLOB_S3_BUCKET: ${OOLU_BLOB_S3_BUCKET:-}
      OOLU_BLOB_S3_ENDPOINT: ${OOLU_BLOB_S3_ENDPOINT:-}
      OOLU_BLOB_S3_ACCESS_KEY_ID: ${OOLU_BLOB_S3_ACCESS_KEY_ID:-}
      OOLU_BLOB_S3_SECRET_ACCESS_KEY: ${OOLU_BLOB_S3_SECRET_ACCESS_KEY:-}
      OOLU_BLOB_S3_PREFIX: ${OOLU_BLOB_S3_PREFIX:-}
      # The hosted plan's model keys (optional): set these and tenants
      # on paid plans get the subscription brain — and every FREE tenant
      # gets a one-time $10 trial of it (lifetime, never renews; the
      # spend rides these keys, so budget for it). Leave unset and every
      # user brings their own key in Settings (own-api) — both are real
      # APIs through the same router.
      OOLU_PLATFORM_ANTHROPIC_KEY: ${OOLU_PLATFORM_ANTHROPIC_KEY:-}
      OOLU_PLATFORM_OPENAI_KEY: ${OOLU_PLATFORM_OPENAI_KEY:-}
      # "Continue with Google" (optional): a Web-application OAuth client
      # from Google Cloud Console — setup in docs/deploy-production.md.
      OOLU_GOOGLE_CLIENT_ID: ${OOLU_GOOGLE_CLIENT_ID:-}
      OOLU_GOOGLE_CLIENT_SECRET: ${OOLU_GOOGLE_CLIENT_SECRET:-}
      # Outbound MAIL — what makes reset codes, e-mailed passwords, and
      # verification-first registration REAL on this host. Either the
      # classic SMTP mailbox (host + from; user/password unless it is an
      # open relay; security starttls|ssl|none, default starttls) …
      OOLU_SMTP_HOST: ${OOLU_SMTP_HOST:-}
      OOLU_SMTP_PORT: ${OOLU_SMTP_PORT:-}
      OOLU_SMTP_USER: ${OOLU_SMTP_USER:-}
      OOLU_SMTP_PASSWORD: ${OOLU_SMTP_PASSWORD:-}
      OOLU_SMTP_SECURITY: ${OOLU_SMTP_SECURITY:-}
      # … or a Resend-style HTTP JSON door. Both need the from-address.
      OOLU_MAIL_URL: ${OOLU_MAIL_URL:-}
      OOLU_MAIL_KEY: ${OOLU_MAIL_KEY:-}
      OOLU_MAIL_FROM: ${OOLU_MAIL_FROM:-}
      OOLU_MAIL: ${OOLU_MAIL:-}
      # Outbound SMS — the "continue with phone" door. Twilio (the
      # common provider) or any generic JSON endpoint; absent, the
      # phone routes answer 404 and the app hides the button.
      OOLU_SMS: ${OOLU_SMS:-}
      OOLU_SMS_PROVIDER: ${OOLU_SMS_PROVIDER:-}
      OOLU_SMS_URL: ${OOLU_SMS_URL:-}
      OOLU_SMS_KEY: ${OOLU_SMS_KEY:-}
      OOLU_SMS_FROM: ${OOLU_SMS_FROM:-}
      OOLU_TWILIO_ACCOUNT_SID: ${OOLU_TWILIO_ACCOUNT_SID:-}
      OOLU_TWILIO_AUTH_TOKEN: ${OOLU_TWILIO_AUTH_TOKEN:-}
      # CORS origins allowed to call this API from another domain —
      # e.g. the hosted investor panel. Comma-separated.
      OOLU_ALLOW_ORIGIN: ${OOLU_ALLOW_ORIGIN:-}
    volumes:
      - oolu-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oolu
      POSTGRES_USER: oolu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oolu -d oolu"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  caddy-data:
  caddy-config:
  oolu-data:
  postgres-data:
