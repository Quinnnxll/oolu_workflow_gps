# OoLu configuration for the hosted OpenAI API.
#
# Use this when pointing the engine at https://api.openai.com instead of a local
# vLLM server. The only thing you must provide is your key in the environment:
#
#   PowerShell:  $env:OPENAI_API_KEY = "sk-..."
#
# Then run:
#   python -m oolu.cli run "..." --config ../config/openai.yaml --json
#
# Key differences from the local vLLM template (config/models.yaml):
#   * OpenAI model names (gpt-4o-mini / gpt-4o) instead of Qwen/Llama.
#   * api_base = the official OpenAI endpoint.
#   * top_k is null on BOTH tiers — OpenAI rejects top_k, and LiteLLM forwards it
#     via extra_body rather than dropping it, so it must simply not be set here.

routing:
  fast:
    tier: fast
    model: "openai/gpt-4o-mini"
    api_base: "https://api.openai.com/v1"
    base_temperature: 0.1
    max_temperature: 0.7
    top_p: 0.8
    top_k: null
    max_tokens: 4096
    extra_params: {}
  reasoning:
    tier: reasoning
    model: "openai/gpt-4o"
    api_base: "https://api.openai.com/v1"
    base_temperature: 0.3
    max_temperature: 0.7
    top_p: 0.9
    top_k: null
    max_tokens: 4096
    extra_params: {}

  max_fast_recalcs: 3
  rut_bump_threshold: 2
  rut_escalate_threshold: 3
  rut_temperature_step: 0.15

limits:
  cpus: 1.0
  memory_mb: 512
  pids_limit: 256
  wall_timeout_s: 30.0
  install_timeout_s: 120.0
  read_only_rootfs: true
  writable_scratch_mb: 64

edges:
  max_recalcs: 6
  dep_heal_rut_threshold: 2

backend:
  kind: subprocess
  image: "oolu-sandbox:latest"
  network_name: "bridge"
  uv_cache_dir: null
  pinned_index_url: null
  run_as_user: null

graph:
  recursion_limit: null

request_timeout_s: 120.0
