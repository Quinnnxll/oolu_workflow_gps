# Self-hosting Workflow-GPS for online web users (multi-user accounts):
#
#   WFGPS_HOST_SECRET=$(openssl rand -base64 32) \
#   WFGPS_ADMIN_PASSWORD=change-me-soon docker compose up -d
#   docker compose logs workflow-gps   # shows the admin sign-in details
#
# Terminate TLS in front of this (Caddy, nginx, Traefik, a cloud load
# balancer): passwords and bearer tokens must not travel over plain HTTP
# outside your machine.
services:
  workflow-gps:
    build: .
    ports:
      - "8765:8765"
    environment:
      WFGPS_HOST_SECRET: ${WFGPS_HOST_SECRET:?set WFGPS_HOST_SECRET to a long random secret}
      WFGPS_ADMIN_PASSWORD: ${WFGPS_ADMIN_PASSWORD:-}
    volumes:
      - wfgps-data:/data
    restart: unless-stopped

volumes:
  wfgps-data:
